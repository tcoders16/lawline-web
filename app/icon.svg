<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1E3F73"/>
      <stop offset="100%" stop-color="#0E2347"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="15%" r="60%">
      <stop offset="0%"   stop-color="#B8963E" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#B8963E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#D4AE58"/>
      <stop offset="100%" stop-color="#B8963E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>
  <rect width="40" height="40" rx="10" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="39" height="39" rx="9.5" stroke="rgba(255,255,255,0.10)" stroke-width="1" fill="none"/>

  <!-- L letterform -->
  <rect x="11" y="9" width="5.5" height="20" rx="1.75" fill="#FDFCFA" opacity="0.95"/>
  <rect x="11" y="24.5" width="18" height="5.5" rx="1.75" fill="#FDFCFA" opacity="0.95"/>

  <!-- AI gold node -->
  <circle cx="29.5" cy="10.5" r="5.5" fill="rgba(184,150,62,0.18)"/>
  <circle cx="29.5" cy="10.5" r="3.75" fill="url(#gold)"/>
  <circle cx="29.5" cy="10.5" r="2" fill="#E4C068"/>

  <!-- Neural thread -->
  <line x1="16.5" y1="11.5" x2="25.5" y2="10.5"
        stroke="#D4AE58" stroke-width="0.85"
        stroke-dasharray="2.5 2" stroke-linecap="round" opacity="0.55"/>
</svg>
